<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Parvez</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<h1>Admin Panel</h1>

<div class="section">
  <h2>Profile</h2>
  <input type="text" id="adminName" placeholder="Name">
  <textarea id="adminBio" placeholder="Bio"></textarea>
  <input type="text" id="adminPhoto" placeholder="Photo URL">
  <button onclick="updateProfile()">Update Profile</button>
</div>

<div class="section">
  <h2>Skills</h2>
  <input type="text" id="newSkill" placeholder="New Skill">
  <button onclick="addSkill()">Add Skill</button>
  <ul id="skillList"></ul>
</div>

<div class="section">
  <h2>Projects</h2>
  <input type="text" id="projTitle" placeholder="Project Title">
  <input type="text" id="projLink" placeholder="Project Link">
  <button onclick="addProject()">Add Project</button>
  <ul id="projectList"></ul>
</div>

<div class="section">
  <h2>Contact</h2>
  <input type="text" id="contactType" placeholder="Type (Email, WhatsApp)">
  <input type="text" id="contactValue" placeholder="Value">
  <button onclick="addContact()">Add Contact</button>
  <ul id="contactList"></ul>
</div>

<script src="js/admin.js"></script>
</body>
</html>
